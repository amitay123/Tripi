name: tripi_app
description: A minimalist travel planner app.
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.1.0
  provider: ^6.1.1
  flutter_svg: ^2.0.9
  intl: ^0.19.0
  http: ^1.6.0
  google_maps_flutter: ^2.17.0
  rxdart: ^0.28.0
  pointer_interceptor: ^0.10.1+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
